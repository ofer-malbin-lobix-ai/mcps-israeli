# CI workflow for skills-il MCP server repos.
#
# Security scanners (Snyk Agent Scan, Cisco MCP Scanner) are installed
# as GitHub Apps at the org level -- they produce check runs automatically
# on push/PR events. This workflow handles lint and build only.

name: CI
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Detect package manager
        id: pkg
        run: |
          if [ -f "package-lock.json" ]; then
            echo "manager=npm" >> "$GITHUB_OUTPUT"
            echo "install=npm ci" >> "$GITHUB_OUTPUT"
            echo "build=npm run build --if-present" >> "$GITHUB_OUTPUT"
            echo "lint=npm run lint --if-present" >> "$GITHUB_OUTPUT"
          elif [ -f "pnpm-lock.yaml" ]; then
            echo "manager=pnpm" >> "$GITHUB_OUTPUT"
            echo "install=pnpm install --frozen-lockfile" >> "$GITHUB_OUTPUT"
            echo "build=pnpm build" >> "$GITHUB_OUTPUT"
            echo "lint=pnpm lint" >> "$GITHUB_OUTPUT"
          elif [ -f "yarn.lock" ]; then
            echo "manager=yarn" >> "$GITHUB_OUTPUT"
            echo "install=yarn install --frozen-lockfile" >> "$GITHUB_OUTPUT"
            echo "build=yarn build" >> "$GITHUB_OUTPUT"
            echo "lint=yarn lint" >> "$GITHUB_OUTPUT"
          elif [ -f "requirements.txt" ] || [ -f "pyproject.toml" ]; then
            echo "manager=python" >> "$GITHUB_OUTPUT"
          else
            echo "manager=none" >> "$GITHUB_OUTPUT"
          fi

      # --- Node.js projects ---
      - uses: pnpm/action-setup@v4
        if: steps.pkg.outputs.manager == 'pnpm'
      - uses: actions/setup-node@v4
        if: steps.pkg.outputs.manager == 'npm' || steps.pkg.outputs.manager == 'pnpm' || steps.pkg.outputs.manager == 'yarn'
        with:
          node-version: 22
          cache: ${{ steps.pkg.outputs.manager }}
      - run: ${{ steps.pkg.outputs.install }}
        if: steps.pkg.outputs.manager != 'python' && steps.pkg.outputs.manager != 'none'
      - run: ${{ steps.pkg.outputs.lint }}
        if: steps.pkg.outputs.manager != 'python' && steps.pkg.outputs.manager != 'none'
        continue-on-error: true
      - run: ${{ steps.pkg.outputs.build }}
        if: steps.pkg.outputs.manager != 'python' && steps.pkg.outputs.manager != 'none'

      # --- Python projects ---
      - uses: actions/setup-python@v5
        if: steps.pkg.outputs.manager == 'python'
        with:
          python-version: '3.12'
      - name: Install Python dependencies
        if: steps.pkg.outputs.manager == 'python'
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f pyproject.toml ]; then pip install .; fi
