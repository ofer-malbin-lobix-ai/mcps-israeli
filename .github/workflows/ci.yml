# CI workflow for skills-il MCP server repos.
#
# Produces check runs that the skills-il scan pipeline reads:
#   - "Cisco MCP Scanner"  (supply-chain behavioral analysis via cisco-ai-mcp-scanner)
#   - "Snyk Agent Scan"    (LLM-based prompt injection / exfil detection)

name: CI
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Detect package manager
        id: pkg
        run: |
          if [ -f "package-lock.json" ]; then
            echo "manager=npm" >> "$GITHUB_OUTPUT"
            echo "install=npm ci" >> "$GITHUB_OUTPUT"
            echo "build=npm run build --if-present" >> "$GITHUB_OUTPUT"
            echo "lint=npm run lint --if-present" >> "$GITHUB_OUTPUT"
          elif [ -f "pnpm-lock.yaml" ]; then
            echo "manager=pnpm" >> "$GITHUB_OUTPUT"
            echo "install=pnpm install --frozen-lockfile" >> "$GITHUB_OUTPUT"
            echo "build=pnpm build" >> "$GITHUB_OUTPUT"
            echo "lint=pnpm lint" >> "$GITHUB_OUTPUT"
          elif [ -f "yarn.lock" ]; then
            echo "manager=yarn" >> "$GITHUB_OUTPUT"
            echo "install=yarn install --frozen-lockfile" >> "$GITHUB_OUTPUT"
            echo "build=yarn build" >> "$GITHUB_OUTPUT"
            echo "lint=yarn lint" >> "$GITHUB_OUTPUT"
          elif [ -f "requirements.txt" ] || [ -f "pyproject.toml" ]; then
            echo "manager=python" >> "$GITHUB_OUTPUT"
          else
            echo "manager=none" >> "$GITHUB_OUTPUT"
          fi

      # --- Node.js projects ---
      - uses: pnpm/action-setup@v4
        if: steps.pkg.outputs.manager == 'pnpm'
      - uses: actions/setup-node@v4
        if: steps.pkg.outputs.manager == 'npm' || steps.pkg.outputs.manager == 'pnpm' || steps.pkg.outputs.manager == 'yarn'
        with:
          node-version: 22
          cache: ${{ steps.pkg.outputs.manager }}
      - run: ${{ steps.pkg.outputs.install }}
        if: steps.pkg.outputs.manager != 'python' && steps.pkg.outputs.manager != 'none'
      - run: ${{ steps.pkg.outputs.lint }}
        if: steps.pkg.outputs.manager != 'python' && steps.pkg.outputs.manager != 'none'
        continue-on-error: true
      - run: ${{ steps.pkg.outputs.build }}
        if: steps.pkg.outputs.manager != 'python' && steps.pkg.outputs.manager != 'none'

      # --- Python projects ---
      - uses: actions/setup-python@v5
        if: steps.pkg.outputs.manager == 'python'
        with:
          python-version: '3.12'
      - name: Install Python dependencies
        if: steps.pkg.outputs.manager == 'python'
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f pyproject.toml ]; then pip install .; fi

  # -----------------------------------------------------------------------
  # Cisco MCP Scanner
  # Static + YARA analysis via Cisco AI Defense reusable workflow.
  # Free, no API keys required. Results appear as Code Scanning alerts.
  # -----------------------------------------------------------------------
  cisco-mcp-scanner:
    name: Cisco MCP Scanner
    uses: cisco-ai-defense/skill-scanner/.github/workflows/scan-skills.yml@main
    with:
      skill_path: '.'
      fail_on_severity: critical
    permissions:
      security-events: write
      contents: read

  # -----------------------------------------------------------------------
  # Snyk Agent Scan
  # LLM-based scan for prompt injection, data exfiltration, credential
  # theft, and obfuscated payloads.
  # Requires SNYK_TOKEN org secret from https://app.snyk.io/account
  # -----------------------------------------------------------------------
  snyk-agent-scan:
    name: Snyk Agent Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Snyk Agent Scan
        run: pipx install snyk-agent-scan
      - name: Run agent scan
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          if [ -z "$SNYK_TOKEN" ]; then
            echo "::warning::SNYK_TOKEN not set, skipping scan"
            exit 0
          fi
          snyk-agent-scan --json .
